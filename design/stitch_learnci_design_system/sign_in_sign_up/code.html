<style>
        body {
            background-color: #10131f;
            overflow: hidden;
        }
        .bg-gradient-diagonal {
            background: linear-gradient(135deg, #0b0e19 0%, #1c1f2b 50%, #10131f 100%);
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .glow-gold:hover {
            box-shadow: 0 0 20px rgba(255, 199, 136, 0.4);
        }
        .glow-teal-focus:focus-within {
            box-shadow: 0 0 15px rgba(0, 227, 253, 0.2);
            border-color: #00daf3;
        }
        .tab-transition {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .floating {
            animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
            100% { transform: translateY(0px); }
        }
    </style>

<body class="bg-gradient-diagonal min-h-screen flex items-center justify-center p-gutter relative">
<!-- Atmospheric Background Blobs -->
<div class="absolute top-[-10%] left-[-10%] w-[500px] h-[500px] bg-primary/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[600px] h-[600px] bg-secondary-fixed-dim/5 rounded-full blur-[150px] pointer-events-none"></div>
<!-- Main Auth Container -->
<div class="w-full max-w-[480px] z-10 floating">
<!-- Brand Header -->
<div class="flex flex-col items-center mb-xl">
<h1 class="font-display-lg text-display-lg font-extrabold text-primary tracking-tighter mb-xs">LearnCI</h1>
<p class="font-label-caps text-label-caps text-text-dim tracking-widest">LANGUAGE OPERATIVE ACCESS</p>
</div>
<!-- Glassmorphic Card -->
<div class="glass-panel rounded-xl p-xl shadow-2xl">
<!-- Tabs -->
<div class="flex gap-sm mb-xl bg-surface-container-lowest/50 p-base rounded-lg border border-glass-border">
<button class="tab-transition flex-1 py-md rounded-lg font-label-caps text-label-caps text-on-surface bg-white/10 shadow-sm border border-white/5" id="tab-signin" onclick="switchTab('signin')">
                    SIGN IN
                </button>
<button class="tab-transition flex-1 py-md rounded-lg font-label-caps text-label-caps text-text-dim hover:text-on-surface" id="tab-signup" onclick="switchTab('signup')">
                    CREATE ACCOUNT
                </button>
</div>
<!-- Content Area (Login Mode) -->
<form class="space-y-lg" id="auth-form">
<div class="space-y-sm">
<label class="font-label-caps text-label-caps text-text-muted ml-base">IDENTIFICATION (EMAIL)</label>
<div class="glow-teal-focus flex items-center bg-surface-container-highest/30 border border-glass-border rounded-xl px-md transition-all">
<span class="material-symbols-outlined text-text-dim mr-sm">alternate_email</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-xl font-body-base text-body-base text-on-surface placeholder:text-text-dim" placeholder="agent@learnci.net" type="email"/>
</div>
</div>
<div class="space-y-sm">
<div class="flex justify-between items-center ml-base">
<label class="font-label-caps text-label-caps text-text-muted">ACCESS KEY (PASSWORD)</label>
</div>
<div class="glow-teal-focus flex items-center bg-surface-container-highest/30 border border-glass-border rounded-xl px-md transition-all">
<span class="material-symbols-outlined text-text-dim mr-sm">lock</span>
<input class="w-full bg-transparent border-none focus:ring-0 py-xl font-body-base text-body-base text-on-surface placeholder:text-text-dim" placeholder="••••••••" type="password"/>
<button class="material-symbols-outlined text-text-dim hover:text-primary transition-colors" type="button">visibility</button>
</div>
</div>
<!-- Primary Action -->
<button class="glow-gold w-full py-lg rounded-xl bg-primary-container text-on-primary font-display-lg text-headline-sm font-bold tracking-tight hover:scale-[1.02] active:scale-[0.98] transition-all flex items-center justify-center gap-sm" type="submit">
<span id="submit-text">INITIALIZE SESSION</span>
<span class="material-symbols-outlined">bolt</span>
</button>
<!-- Divider -->
<div class="flex items-center gap-md py-md">
<div class="h-[1px] flex-1 bg-glass-border"></div>
<span class="font-label-caps text-badge-caption text-text-dim uppercase">External Protocol</span>
<div class="h-[1px] flex-1 bg-glass-border"></div>
</div>
<!-- Social Auth -->
<button class="w-full py-lg rounded-xl border border-glass-border bg-white/5 hover:bg-white/10 text-on-surface font-body-base flex items-center justify-center gap-md transition-all group" type="button">
<svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewbox="0 0 24 24">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-5.38z" fill="#EA4335"></path>
</svg>
                    Sign In with Google
                </button>
<!-- Footer Links -->
<div class="flex flex-col items-center gap-md pt-md">
<a class="font-label-caps text-label-caps text-primary hover:text-primary-fixed transition-colors" href="#">Forgot Password?</a>
<p class="text-text-dim font-body-base text-[12px] text-center px-lg">
                        By accessing this portal, you agree to the 
                        <a class="text-on-surface underline" href="#">Neural Terms of Service</a>.
                    </p>
</div>
</form>
</div>
<!-- System Status Footer -->
<div class="mt-xl flex justify-between items-center px-md opacity-40">
<div class="flex items-center gap-xs">
<div class="w-2 h-2 rounded-full bg-success animate-pulse"></div>
<span class="font-label-caps text-badge-caption text-on-surface">UPLINK ACTIVE</span>
</div>
<span class="font-label-caps text-badge-caption text-on-surface">v4.2.0-SIGMA</span>
</div>
</div>
<script>
        function switchTab(mode) {
            const signinBtn = document.getElementById('tab-signin');
            const signupBtn = document.getElementById('tab-signup');
            const submitText = document.getElementById('submit-text');
            
            if (mode === 'signin') {
                signinBtn.classList.add('bg-white/10', 'shadow-sm', 'text-on-surface', 'border-white/5');
                signinBtn.classList.remove('text-text-dim');
                signupBtn.classList.remove('bg-white/10', 'shadow-sm', 'text-on-surface', 'border-white/5');
                signupBtn.classList.add('text-text-dim');
                submitText.textContent = 'INITIALIZE SESSION';
            } else {
                signupBtn.classList.add('bg-white/10', 'shadow-sm', 'text-on-surface', 'border-white/5');
                signupBtn.classList.remove('text-text-dim');
                signinBtn.classList.remove('bg-white/10', 'shadow-sm', 'text-on-surface', 'border-white/5');
                signinBtn.classList.add('text-text-dim');
                submitText.textContent = 'CREATE OPERATIVE';
            }
        }

        // Add subtle mouse movement parallax to the background blobs
        document.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            
            const blobs = document.querySelectorAll('.absolute.rounded-full');
            blobs.forEach((blob, index) => {
                const multiplier = (index + 1) * 20;
                blob.style.transform = `translate(${x * multiplier}px, ${y * multiplier}px)`;
            });
        });
    </script>
</body></html>
